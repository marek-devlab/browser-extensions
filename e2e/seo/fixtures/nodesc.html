<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>No Description Fixture</title>
  <!-- Intentionally NO meta[name=description], NO canonical, NO viewport. -->
</head>
<body>
  <h1>Page With No Meta Description</h1>
  <p>This page deliberately omits its meta description and canonical link so the
    auditor must report the description as an explicit missing state rather than
    an empty string.</p>
</body>
</html>
