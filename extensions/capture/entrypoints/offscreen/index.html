<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- CHROME ONLY. `chrome.offscreen` does not exist in Firefox, so this
         document is not merely unused there — it is unreachable. Shipping it in
         the Firefox build would be dead code a reviewer has to ask about. -->
    <meta name="wxt.exclude" content="['firefox']" />
    <title>Capture Studio — offscreen</title>
  </head>
  <body>
    <!-- CHROME ONLY, invisible. This document exists solely because MediaRecorder
         needs a DOM and a service worker has none (design §9.5). It owns the
         MediaStream + MediaRecorder and streams chunks to IndexedDB. It has NO
         visible UI (so it cannot show a mic permission prompt — design §5.9).
         Firefox never loads this: its recorder WINDOW owns the stream instead. -->
    <script type="module" src="./main.ts"></script>
  </body>
</html>
